<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-5">

<h2 class="mb-4">Edit Patient</h2>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Name</label>
<input type="text" class="form-control" name="name" value="{{ patient.name }}" required>
</div>

<div class="col-md-6 mb-3">
<label>Age</label>
<input type="number" class="form-control" name="age" value="{{ patient.age }}" required>
</div>

<div class="col-md-6 mb-3">
<label>Gender</label>
<select class="form-select" name="gender">

<option {% if patient.gender=="Male" %}selected{% endif %}>Male</option>

<option {% if patient.gender=="Female" %}selected{% endif %}>Female</option>

<option {% if patient.gender=="Other" %}selected{% endif %}>Other</option>

</select>
</div>

<div class="col-md-6 mb-3">
<label>Height (cm)</label>
<input type="number" step="0.1" class="form-control" name="height" value="{{ patient.height }}" required>
</div>

<div class="col-md-6 mb-3">
<label>Weight (kg)</label>
<input type="number" step="0.1" class="form-control" name="weight" value="{{ patient.weight }}" required>
</div>

<div class="col-md-6 mb-3">
<label>Blood Pressure</label>
<input type="text" class="form-control" name="blood_pressure" value="{{ patient.blood_pressure }}">
</div>

<div class="col-md-6 mb-3">
<label>Blood Sugar</label>
<input type="number" step="0.1" class="form-control" name="blood_sugar" value="{{ patient.blood_sugar }}">
</div>

<div class="col-md-6 mb-3">
<label>Smoking</label>

<select class="form-select" name="smoking">

<option {% if patient.smoking=="No" %}selected{% endif %}>No</option>

<option {% if patient.smoking=="Yes" %}selected{% endif %}>Yes</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Exercise</label>

<select class="form-select" name="exercise">

<option {% if patient.exercise=="Daily" %}selected{% endif %}>Daily</option>

<option {% if patient.exercise=="Weekly" %}selected{% endif %}>Weekly</option>

<option {% if patient.exercise=="Rarely" %}selected{% endif %}>Rarely</option>

<option {% if patient.exercise=="Never" %}selected{% endif %}>Never</option>

</select>

</div>

</div>

<button class="btn btn-success">
Update Patient
</button>

<a href="/patients" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</body>

</html>
