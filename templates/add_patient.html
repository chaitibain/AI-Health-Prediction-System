<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Patient</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">
            🏥 AI Health Prediction System
        </a>
    </div>
</nav>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h3>Add Patient</h3>
</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">
<label class="form-label">Full Name</label>
<input
type="text"
name="full_name"
class="form-control"
required>
</div>

<div class="mb-3">
<label class="form-label">Date of Birth</label>
<input
type="date"
name="date_of_birth"
class="form-control"
required>
</div>

<div class="mb-3">
<label class="form-label">Email Address</label>
<input
type="email"
name="email"
class="form-control"
required>
</div>

<div class="mb-3">
<label class="form-label">Glucose (mg/dL)</label>
<input
type="number"
step="0.01"
name="glucose"
class="form-control"
required>
</div>

<div class="mb-3">
<label class="form-label">Haemoglobin (g/dL)</label>
<input
type="number"
step="0.01"
name="haemoglobin"
class="form-control"
required>
</div>

<div class="mb-3">
<label class="form-label">Cholesterol (mg/dL)</label>
<input
type="number"
step="0.01"
name="cholesterol"
class="form-control"
required>
</div>

<button
type="submit"
class="btn btn-success">
Save Patient
</button>

<a
href="/patients"
class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</div>

</body>
</html>
