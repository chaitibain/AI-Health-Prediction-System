<!DOCTYPE html>
<html>

<head>

<title>Add Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-5">

<h2 class="mb-4">Add Patient</h2>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>Name</label>

<input type="text" name="name" class="form-control" required>

</div>

<div class="col-md-6 mb-3">

<label>Age</label>

<input type="number" name="age" class="form-control" required>

</div>

<div class="col-md-6 mb-3">

<label>Gender</label>

<select name="gender" class="form-select">

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Height (cm)</label>

<input type="number" step="0.1" name="height" class="form-control" required>

</div>

<div class="col-md-6 mb-3">

<label>Weight (kg)</label>

<input type="number" step="0.1" name="weight" class="form-control" required>

</div>

<div class="col-md-6 mb-3">

<label>Blood Pressure</label>

<input type="text" name="blood_pressure" class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Blood Sugar</label>

<input type="number" step="0.1" name="blood_sugar" class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Smoking</label>

<select name="smoking" class="form-select">

<option>No</option>

<option>Yes</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Exercise</label>

<select name="exercise" class="form-select">

<option>Daily</option>

<option>Weekly</option>

<option>Rarely</option>

<option>Never</option>

</select>

</div>

</div>

<button class="btn btn-success">

Save Patient

</button>

<a href="/" class="btn btn-secondary">

Back

</a>

</form>

</div>

</div>

</body>

</html>
